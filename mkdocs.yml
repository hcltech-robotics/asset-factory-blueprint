site_name: Asset Factory Blueprint
site_description: Documentation for the asset factory blueprint for governed OpenUSD asset pipelines.
site_url: https://hcltech-robotics.github.io/asset-factory-blueprint/
site_author: HCLTech Robotics
repo_url: https://github.com/hcltech-robotics/asset-factory-blueprint
repo_name: hcltech-robotics/asset-factory-blueprint
docs_dir: docs
site_dir: site
strict: true
use_directory_urls: false

theme:
  name: material
  custom_dir: docs/overrides
  language: en
  features:
    - content.code.annotate
    - content.code.copy
    - navigation.footer
    - navigation.instant
    - navigation.instant.progress
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - search.highlight
    - search.suggest
    - toc.follow
  font:
    text: Manrope
    code: IBM Plex Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: hcltech-light
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Use dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: hcltech-dark
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Use light mode
  logo: assets/images/hcltech-logo-white.svg
  favicon: assets/images/hcltech-robotics-mark.svg

extra:
  brand_title: Asset Factory Blueprint
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/hcltech-robotics/asset-factory-blueprint
      name: Asset Factory Blueprint on GitHub

markdown_extensions:
  - fenced_code
  - sane_lists
  - tables
  - toc:
      permalink: Link to this section
      permalink_title: Link to this section
      title: On this page
  - admonition
  - attr_list
  - footnotes
  - md_in_html
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - Index: index.md
  - Quickstart: quickstart.md
  - Walkthrough: walkthrough.md
  - Runthrough: runthrough.md
  - Blueprint:
      - Blueprint: blueprint.md
      - Reference architecture: reference-architecture.md
      - Runtime architecture: runtime-architecture.md
  - Pipeline:
      - Intake and sources: pipeline/00-intake-and-sources.md
      - Reconstruction: pipeline/01-reconstruction.md
      - Mandatory mesh verification: pipeline/01a-mesh-verification.md
      - Segmentation: pipeline/02-segmentation.md
      - Material and physical inference: pipeline/03-material-inference.md
      - Texturing: pipeline/04-texturing.md
      - Physics and articulation: pipeline/05-physics-articulation.md
      - Nonvisual materials: pipeline/06-nonvisual-materials.md
      - SimReady verification: pipeline/07-simready-verification.md
      - Texture defaults: pipeline/texture-defaults.md
  - Operations:
      - Orchestrator: platform/orchestrator.md
      - Agentic operation: platform/agentic-operation.md
      - Direct partial invocation: platform/direct-partial-invocation.md
      - Libraries: platform/libraries.md
      - Infrastructure: platform/infrastructure.md
      - Deployment: platform/deployment.md
      - External model runners: platform/external-model-runners.md
      - Toolchain: toolchain.md
      - RL environment: extensions/rl-environment.md
  - Governance:
      - Agent system: agent-system.md
      - Governance: platform/governance.md
      - Mandatory early mesh verification decision: design-decisions/mandatory-mesh-verification.md
      - Manifest contracts: manifest-contracts.md
      - Layer ownership and variants: platform/layer-ownership-and-variants.md
      - Layout and mutation plans: platform/layout-and-mutation-plans.md
      - Citation and reproducibility: citation-and-reproducibility.md
      - Reference-run capsule: reference-run-capsule.md
  - Reference:
      - Requirements: requirements.md
      - Support matrix: support-matrix.md
      - Environment reference: environment-reference.md
      - Troubleshooting: troubleshooting.md
      - Repository structure: repository-structure.md
      - Project workspaces: project-workspaces.md
      - Provider abstraction: provider-abstraction.md
      - Skill SDK: skill-sdk.md
      - Source map: source-map.md
