apiVersion: v1
kind: ConfigMap
metadata:
  name: asset-factory-config
data:
  AFB_ENV: kubernetes
  AFB_TRUSTED_TOOL_SERVER_NETWORK: "1"
  AFB_TOOL_SERVER_ALLOWED_TOOLS: asset_library_search,material_propose,material_texture_defaults_validate,scene_layout_validate
  AFB_TOOL_SERVER_JOB_STORE: /workspace/artifacts/tool-server-state
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: asset-factory
spec:
  replicas: 1
  selector:
    matchLabels:
      app: asset-factory
  template:
    metadata:
      labels:
        app: asset-factory
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: tool-server
          image: asset-factory-blueprint:1.0.0
          imagePullPolicy: IfNotPresent
          args:
            - afb
            - tool-server
            - --transport
            - http
            - --host
            - 0.0.0.0
            - --port
            - "8181"
            - --max-request-bytes
            - "1048576"
            - --max-result-bytes
            - "4194304"
            - --max-http-threads
            - "32"
            - --max-workers
            - "4"
            - --max-retained-jobs
            - "256"
            - --max-retries
            - "1"
            - --job-store
            - artifacts/tool-server-state
            - --audit-log
            - artifacts/tool-server-audit.jsonl
          envFrom:
            - configMapRef:
                name: asset-factory-config
          env:
            - name: AFB_TOOL_SERVER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: asset-factory-tool-server
                  key: bearer-token
            - name: AFB_TOOL_SERVER_APPROVAL_SECRET
              valueFrom:
                secretKeyRef:
                  name: asset-factory-tool-server
                  key: approval-secret
          ports:
            - name: http
              containerPort: 8181
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 4Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: projects
              mountPath: /workspace/projects
            - name: artifacts
              mountPath: /workspace/artifacts
            - name: cache
              mountPath: /workspace/.cache
            - name: downloads
              mountPath: /workspace/library/downloads
            - name: temporary
              mountPath: /tmp
      volumes:
        - name: projects
          emptyDir: {}
        - name: artifacts
          emptyDir: {}
        - name: cache
          emptyDir: {}
        - name: downloads
          emptyDir: {}
        - name: temporary
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: asset-factory
spec:
  type: ClusterIP
  selector:
    app: asset-factory
  ports:
    - name: http
      port: 8181
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: asset-factory-ingress
spec:
  podSelector:
    matchLabels:
      app: asset-factory
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              asset-factory-client: "true"
      ports:
        - protocol: TCP
          port: 8181
