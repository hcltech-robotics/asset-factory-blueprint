name: Change proposal
description: Propose an interface, contract, runtime or documentation change.
title: "[Change] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: State the operator or integration problem and the evidence that it exists.
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Required outcome
      description: Describe externally observable acceptance conditions.
    validations:
      required: true
  - type: dropdown
    id: contract
    attributes:
      label: Public contract effect
      options:
        - No public contract change
        - Compatible additive change
        - Breaking change requiring a new major contract
        - Unsure
    validations:
      required: true
  - type: textarea
    id: migration
    attributes:
      label: Compatibility and migration
      description: Identify affected schemas, tools, layers, stages and release evidence.
