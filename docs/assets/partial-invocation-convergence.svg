<svg xmlns="http://www.w3.org/2000/svg" width="1360" height="620" viewBox="0 0 1360 620" role="img" aria-labelledby="title desc">
  <title id="title">Direct partial invocation</title>
  <desc id="desc">CLI and agent entry paths converge on the same stage service, artefact refresh, VLM review loop and durable state updates.</desc>
  <defs>
    <style>
      .bg { fill: transparent; }
      .box { fill: #222229; stroke: #3b3e49; stroke-width: 2; }
      .boxHot { fill: #292931; stroke: #3c91ff; stroke-width: 2.3; }
      .inner { fill: #2f3039; stroke: #526476; stroke-width: 1.9; }
      .innerHot { fill: #292931; stroke: #3c91ff; stroke-width: 1.9; }
      .innerAccent { fill: #2f3039; stroke: #8c69f0; stroke-width: 1.9; }
      .label { fill: #f0f2f8; font-family: Aptos, Helvetica, sans-serif; font-size: 20px; font-weight: 680; }
      .small { fill: #c8d2dd; font-family: Aptos, Helvetica, sans-serif; font-size: 13px; font-weight: 620; }
      .line { stroke: #4bc3af; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .primaryLine { stroke: #3c91ff; stroke-width: 2.4; fill: none; marker-end: url(#arrowPrimary); }
      .accentLine { stroke: #8c69f0; stroke-width: 2.4; fill: none; marker-end: url(#arrowAccent); }
    </style>
    <marker id="arrow" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 1 L 8 4 L 0 7 z" fill="#4bc3af"/>
    </marker>
    <marker id="arrowPrimary" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 1 L 8 4 L 0 7 z" fill="#3c91ff"/>
    </marker>
    <marker id="arrowAccent" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 1 L 8 4 L 0 7 z" fill="#8c69f0"/>
    </marker>
  </defs>
  <rect class="box" x="45" y="70" width="230" height="150" rx="8"/>
  <text class="label" x="160.0" y="112" text-anchor="middle">CLI</text>
  <rect class="inner" x="67" y="134" width="186" height="31" rx="4"/>
  <text class="small" x="160.0" y="154.0" text-anchor="middle" style="font-size:13px">afb stage run</text>
  <rect class="inner" x="67" y="173" width="186" height="31" rx="4"/>
  <text class="small" x="160.0" y="192.5" text-anchor="middle" style="font-size:12px">project or request</text>
  <rect class="box" x="45" y="350" width="230" height="150" rx="8"/>
  <text class="label" x="160.0" y="392" text-anchor="middle">Agent tool</text>
  <rect class="inner" x="67" y="414" width="186" height="31" rx="4"/>
  <text class="small" x="160.0" y="433.5" text-anchor="middle" style="font-size:12px">asset_stage_run</text>
  <rect class="inner" x="67" y="453" width="186" height="31" rx="4"/>
  <text class="small" x="160.0" y="473.0" text-anchor="middle" style="font-size:13px">stage-invoker</text>
  <rect class="boxHot" x="360" y="185" width="270" height="220" rx="8"/>
  <text class="label" x="495.0" y="227" text-anchor="middle">Same stage service</text>
  <rect class="innerAccent" x="382" y="256" width="226" height="34" rx="4"/>
  <text class="small" x="495.0" y="277.5" text-anchor="middle" style="font-size:13px">one contract</text>
  <rect class="inner" x="382" y="302" width="226" height="34" rx="4"/>
  <text class="small" x="495.0" y="323.5" text-anchor="middle" style="font-size:13px">same rubric</text>
  <rect class="inner" x="382" y="348" width="226" height="34" rx="4"/>
  <text class="small" x="495.0" y="369.5" text-anchor="middle" style="font-size:13px">same gates</text>
  <path class="accentLine" d="M275 145 L315 145 L315 250 L356 250"/>
  <path class="accentLine" d="M275 425 L315 425 L315 340 L356 340"/>
  <rect class="box" x="700" y="175" width="185" height="240" rx="8"/>
  <text class="label" x="792.5" y="217" text-anchor="middle" style="font-size:17px">Refresh</text>
  <rect class="inner" x="722" y="279" width="141" height="34" rx="4"/>
  <text class="small" x="792.5" y="300.0" text-anchor="middle" style="font-size:12px">stage artefacts</text>
  <rect class="inner" x="722" y="325" width="141" height="34" rx="4"/>
  <text class="small" x="792.5" y="346.0" text-anchor="middle" style="font-size:12px">manifest inputs</text>
  <rect class="boxHot" x="925" y="175" width="185" height="240" rx="8"/>
  <text class="label" x="1017.5" y="217" text-anchor="middle" style="font-size:17px">VLM review</text>
  <rect class="inner" x="947" y="279" width="141" height="34" rx="4"/>
  <text class="small" x="1017.5" y="300.5" text-anchor="middle" style="font-size:13px">verdict</text>
  <rect class="inner" x="947" y="325" width="141" height="34" rx="4"/>
  <text class="small" x="1017.5" y="346.5" text-anchor="middle" style="font-size:13px">bounded fixes</text>
  <rect class="box" x="1150" y="175" width="185" height="240" rx="8"/>
  <text class="label" x="1242.5" y="217" text-anchor="middle" style="font-size:17px">Durable state</text>
  <rect class="inner" x="1172" y="279" width="141" height="34" rx="4"/>
  <text class="small" x="1242.5" y="300.0" text-anchor="middle" style="font-size:12px">stage-run report</text>
  <rect class="inner" x="1172" y="325" width="141" height="34" rx="4"/>
  <text class="small" x="1242.5" y="346.0" text-anchor="middle" style="font-size:12px">progress + hashes</text>
  <path class="line" d="M630 295 L696 295"/>
  <path class="accentLine" d="M885 295 L921 295"/>
  <path class="accentLine" d="M1110 295 L1146 295"/>
  <rect class="innerAccent" x="830" y="465" width="170" height="30" rx="4"/>
  <text class="small" x="915.0" y="484.5" text-anchor="middle" style="font-size:13px">bounded fix</text>
  <path class="accentLine" d="M1018 415 L1018 525 L792 525 L792 415"/>
</svg>
