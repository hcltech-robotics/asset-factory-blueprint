  <rect class="inner" x="838" y="242" width="188" height="34" rx="4"/>
  <text class="small" x="932.0" y="263.0" text-anchor="middle" style="font-size:12px">smooth by selector</text>
  <rect class="inner" x="838" y="288" width="188" height="34" rx="4"/>
  <text class="small" x="932.0" y="309.0" text-anchor="middle" style="font-size:12px">prune fragments</text>
  <path class="line" d="M1048 235 L1064 235"/>
  <rect class="box" x="1068" y="120" width="232" height="230" rx="8"/>
  <text class="label" x="1184.0" y="162" text-anchor="middle">Manifest</text>
  <rect class="inner" x="1090" y="196" width="188" height="34" rx="4"/>
  <text class="small" x="1184.0" y="217.5" text-anchor="middle" style="font-size:13px">segment masks</text>
  <rect class="inner" x="1090" y="242" width="188" height="34" rx="4"/>
  <text class="small" x="1184.0" y="263.5" text-anchor="middle" style="font-size:13px">semantics</text>
  <rect class="inner" x="1090" y="288" width="188" height="34" rx="4"/>
  <text class="small" x="1184.0" y="309.5" text-anchor="middle" style="font-size:13px">consumers</text>
  <rect class="box" x="420" y="420" width="520" height="150" rx="8"/>
  <text class="label" x="680.0" y="462" text-anchor="middle">Downstream consumers</text>
  <rect class="inner" x="442" y="484" width="476" height="18" rx="4"/>
  <text class="small" x="680.0" y="497.0" text-anchor="middle" style="font-size:12px">materials</text>
  <rect class="inner" x="442" y="510" width="476" height="18" rx="4"/>
  <text class="small" x="680.0" y="523.0" text-anchor="middle" style="font-size:12px">texturing</text>
  <rect class="inner" x="442" y="536" width="476" height="18" rx="4"/>
  <text class="small" x="680.0" y="549.0" text-anchor="middle" style="font-size:12px">verification</text>
