  <text class="small" x="680.0" y="263.5" text-anchor="middle" style="font-size:13px">labels</text>
  <rect class="inner" x="586" y="288" width="188" height="34" rx="4"/>
  <text class="small" x="680.0" y="309.0" text-anchor="middle" style="font-size:12px">material regions</text>
  <path class="line" d="M796 235 L812 235"/>
  <rect class="box" x="816" y="120" width="232" height="230" rx="8"/>
