  <rect class="inner" x="82" y="265" width="188" height="34" rx="4"/>
  <text class="small" x="176.0" y="286.0" text-anchor="middle" style="font-size:12px">reconstructed mesh</text>
  <path class="line" d="M292 235 L308 235"/>
  <rect class="boxHot" x="312" y="120" width="232" height="230" rx="8"/>
  <text class="label" x="428.0" y="162" text-anchor="middle">Prior</text>
  <rect class="innerAccent" x="334" y="196" width="188" height="34" rx="4"/>
  <text class="small" x="428.0" y="217.5" text-anchor="middle" style="font-size:13px">SAM masks</text>
  <rect class="inner" x="334" y="242" width="188" height="34" rx="4"/>
  <text class="small" x="428.0" y="263.5" text-anchor="middle" style="font-size:13px">appearance CV</text>
  <rect class="inner" x="334" y="288" width="188" height="34" rx="4"/>
