<svg xmlns="http://www.w3.org/2000/svg" width="1360" height="620" viewBox="0 0 1360 620" role="img" aria-labelledby="title desc">
  <title id="title">Execution lanes</title>
  <desc id="desc">A lane selector maps workload classes to local CLI, GPU runners, containers, the Isaac runtime and storage roots.</desc>
  <defs>
    <style>
      .bg { fill: transparent; }
      .box { fill: #0a100c; stroke: #3d4a42; stroke-width: 2; }
      .boxHot { fill: #0b1608; stroke: #76b900; stroke-width: 2.3; }
      .boxAccent { fill: #160929; stroke: #5f1ebe; stroke-width: 2.3; }
      .inner { fill: #0d130f; stroke: #7d8780; stroke-width: 1.9; }
      .innerHot { fill: #0d1809; stroke: #76b900; stroke-width: 1.9; }
      .innerAccent { fill: #1b0c31; stroke: #5f1ebe; stroke-width: 1.9; }
      .label { fill: #edf3ef; font-family: Aptos, Helvetica, sans-serif; font-size: 20px; font-weight: 680; }
      .small { fill: #c6cec8; font-family: Aptos, Helvetica, sans-serif; font-size: 13px; font-weight: 620; }
      .line { stroke: #e6ece8; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .greenLine { stroke: #76b900; stroke-width: 2.4; fill: none; marker-end: url(#arrowGreen); }
      .accentLine { stroke: #5f1ebe; stroke-width: 2.4; fill: none; marker-end: url(#arrowAccent); }
    </style>
    <marker id="arrow" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 1 L 8 4 L 0 7 z" fill="#e6ece8"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 1 L 8 4 L 0 7 z" fill="#76b900"/>
    </marker>
    <marker id="arrowAccent" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 1 L 8 4 L 0 7 z" fill="#5f1ebe"/>
    </marker>
  </defs>
  <rect class="boxAccent" x="76" y="214" width="250" height="180" rx="8"/>
  <text class="label" x="201.0" y="256" text-anchor="middle">Lane selector</text>
  <rect class="innerAccent" x="98" y="278" width="206" height="25" rx="4"/>
  <text class="small" x="201.0" y="295.0" text-anchor="middle" style="font-size:13px">workload class</text>
  <rect class="inner" x="98" y="315" width="206" height="25" rx="4"/>
  <text class="small" x="201.0" y="332.0" text-anchor="middle" style="font-size:13px">GPU needs</text>
  <rect class="inner" x="98" y="352" width="206" height="25" rx="4"/>
  <text class="small" x="201.0" y="369.0" text-anchor="middle" style="font-size:13px">cost envelope</text>
  <rect class="box" x="468" y="40" width="310" height="158" rx="8"/>
  <text class="label" x="623.0" y="82" text-anchor="middle">Local CLI</text>
  <rect class="innerAccent" x="490" y="105" width="266" height="34" rx="4"/>
  <text class="small" x="623.0" y="126.5" text-anchor="middle" style="font-size:13px">dry runs</text>
  <rect class="inner" x="490" y="147" width="266" height="34" rx="4"/>
  <text class="small" x="623.0" y="168.5" text-anchor="middle" style="font-size:13px">packaging</text>
  <path class="line" d="M326 304 L394 304 L394 119 L468 119"/>
  <rect class="boxAccent" x="468" y="226" width="310" height="158" rx="8"/>
  <text class="label" x="623.0" y="268" text-anchor="middle">GPU runners</text>
  <rect class="innerAccent" x="490" y="291" width="266" height="34" rx="4"/>
  <text class="small" x="623.0" y="312.5" text-anchor="middle" style="font-size:13px">reconstruction</text>
  <rect class="inner" x="490" y="333" width="266" height="34" rx="4"/>
  <text class="small" x="623.0" y="354.0" text-anchor="middle" style="font-size:12px">texture generation</text>
  <path class="accentLine" d="M326 304 L394 304 L394 305 L468 305"/>
  <rect class="box" x="468" y="412" width="310" height="158" rx="8"/>
  <text class="label" x="623.0" y="454" text-anchor="middle">WSL Docker</text>
  <rect class="innerAccent" x="490" y="498" width="266" height="34" rx="4"/>
  <text class="small" x="623.0" y="518.5" text-anchor="middle" style="font-size:11px">containerised paths</text>
  <path class="line" d="M326 304 L394 304 L394 491 L468 491"/>
  <rect class="boxHot" x="904" y="132" width="310" height="158" rx="8"/>
  <text class="label" x="1059.0" y="174" text-anchor="middle">Isaac runtime</text>
  <rect class="innerAccent" x="926" y="197" width="266" height="34" rx="4"/>
  <text class="small" x="1059.0" y="218.5" text-anchor="middle" style="font-size:13px">load checks</text>
  <rect class="inner" x="926" y="239" width="266" height="34" rx="4"/>
  <text class="small" x="1059.0" y="260.5" text-anchor="middle" style="font-size:13px">physics gates</text>
  <rect class="box" x="904" y="330" width="310" height="190" rx="8"/>
  <text class="label" x="1059.0" y="372" text-anchor="middle">Storage roots</text>
  <rect class="innerAccent" x="926" y="395" width="266" height="28" rx="4"/>
  <text class="small" x="1059.0" y="413.5" text-anchor="middle" style="font-size:13px">projects</text>
  <rect class="inner" x="926" y="435" width="266" height="28" rx="4"/>
  <text class="small" x="1059.0" y="453.5" text-anchor="middle" style="font-size:13px">caches</text>
  <rect class="inner" x="926" y="475" width="266" height="28" rx="4"/>
  <text class="small" x="1059.0" y="493.5" text-anchor="middle" style="font-size:13px">downloads</text>
  <path class="accentLine" d="M778 305 L842 305 L842 211 L904 211"/>
  <path class="line" d="M778 491 L842 491 L842 409 L904 409"/>
</svg>
