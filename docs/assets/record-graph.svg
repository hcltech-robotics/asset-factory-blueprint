<svg xmlns="http://www.w3.org/2000/svg" width="1360" height="620" viewBox="0 0 1360 620" role="img" aria-labelledby="title desc">
  <title id="title">Record graph</title>
  <desc id="desc">Run identity, immutable attempts, stage manifests and durable evidence converge on cross-record validation before governance can promote a release or capsule.</desc>
  <defs>
    <style>
      .bg { fill: transparent; }
      .box { fill: #0a100c; stroke: #3d4a42; stroke-width: 2; }
      .boxHot { fill: #0b1608; stroke: #76b900; stroke-width: 2.3; }
      .boxAccent { fill: #160929; stroke: #5f1ebe; stroke-width: 2.3; }
      .inner { fill: #0d130f; stroke: #7d8780; stroke-width: 1.9; }
      .innerHot { fill: #0d1809; stroke: #76b900; stroke-width: 1.9; }
      .innerAccent { fill: #1b0c31; stroke: #5f1ebe; stroke-width: 1.9; }
      .label { fill: #edf3ef; font-family: Aptos, Helvetica, sans-serif; font-size: 20px; font-weight: 680; }
      .small { fill: #c6cec8; font-family: Aptos, Helvetica, sans-serif; font-size: 13px; font-weight: 620; }
      .line { stroke: #e6ece8; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .greenLine { stroke: #76b900; stroke-width: 2.4; fill: none; marker-end: url(#arrowGreen); }
      .accentLine { stroke: #5f1ebe; stroke-width: 2.4; fill: none; marker-end: url(#arrowAccent); }
    </style>
    <marker id="arrow" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 1 L 8 4 L 0 7 z" fill="#e6ece8"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 1 L 8 4 L 0 7 z" fill="#76b900"/>
    </marker>
    <marker id="arrowAccent" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 1 L 8 4 L 0 7 z" fill="#5f1ebe"/>
    </marker>
  </defs>
  <rect class="box" x="50" y="70" width="230" height="160" rx="8"/>
  <text class="label" x="165.0" y="112" text-anchor="middle" style="font-size:18px">Run request + plan</text>
  <rect class="inner" x="72" y="136" width="186" height="34" rx="4"/>
  <text class="small" x="165.0" y="157.5" text-anchor="middle" style="font-size:13px">request digest</text>
  <rect class="inner" x="72" y="178" width="186" height="34" rx="4"/>
  <text class="small" x="165.0" y="199.0" text-anchor="middle" style="font-size:12px">selected stages</text>
  <rect class="box" x="50" y="370" width="230" height="160" rx="8"/>
  <text class="label" x="165.0" y="412" text-anchor="middle" style="font-size:18px">Stage attempts</text>
  <rect class="inner" x="72" y="436" width="186" height="34" rx="4"/>
  <text class="small" x="165.0" y="457.0" text-anchor="middle" style="font-size:12px">immutable history</text>
  <rect class="inner" x="72" y="478" width="186" height="34" rx="4"/>
  <text class="small" x="165.0" y="499.5" text-anchor="middle" style="font-size:13px">I/O digests</text>
  <rect class="box" x="380" y="70" width="250" height="180" rx="8"/>
  <text class="label" x="505.0" y="112" text-anchor="middle">Stage manifests</text>
  <rect class="inner" x="402" y="134" width="206" height="25" rx="4"/>
  <text class="small" x="505.0" y="151.0" text-anchor="middle" style="font-size:13px">stable ids</text>
  <rect class="inner" x="402" y="171" width="206" height="25" rx="4"/>
  <text class="small" x="505.0" y="187.5" text-anchor="middle" style="font-size:12px">upstream records</text>
  <rect class="inner" x="402" y="208" width="206" height="25" rx="4"/>
  <text class="small" x="505.0" y="224.5" text-anchor="middle" style="font-size:12px">promotion states</text>
  <rect class="box" x="380" y="360" width="250" height="180" rx="8"/>
  <text class="label" x="505.0" y="402" text-anchor="middle" style="font-size:18px">Evidence + reports</text>
  <rect class="inner" x="402" y="424" width="206" height="25" rx="4"/>
  <text class="small" x="505.0" y="441.0" text-anchor="middle" style="font-size:13px">checksums</text>
  <rect class="inner" x="402" y="461" width="206" height="25" rx="4"/>
  <text class="small" x="505.0" y="477.5" text-anchor="middle" style="font-size:12px">validator findings</text>
  <rect class="inner" x="402" y="498" width="206" height="25" rx="4"/>
  <text class="small" x="505.0" y="515.0" text-anchor="middle" style="font-size:13px">runtime + task</text>
  <rect class="boxAccent" x="720" y="190" width="260" height="220" rx="8"/>
  <text class="label" x="850.0" y="232" text-anchor="middle">Record graph</text>
  <rect class="innerAccent" x="742" y="254" width="216" height="26" rx="4"/>
  <text class="small" x="850.0" y="271.5" text-anchor="middle" style="font-size:13px">identity links</text>
  <rect class="innerAccent" x="742" y="292" width="216" height="26" rx="4"/>
  <text class="small" x="850.0" y="309.5" text-anchor="middle" style="font-size:13px">digest binding</text>
  <rect class="inner" x="742" y="330" width="216" height="26" rx="4"/>
  <text class="small" x="850.0" y="347.5" text-anchor="middle" style="font-size:13px">selected run</text>
  <rect class="inner" x="742" y="368" width="216" height="26" rx="4"/>
  <text class="small" x="850.0" y="385.5" text-anchor="middle" style="font-size:13px">path closure</text>
  <rect class="box" x="1060" y="90" width="250" height="180" rx="8"/>
  <text class="label" x="1185.0" y="132" text-anchor="middle">Governance</text>
  <rect class="inner" x="1082" y="154" width="206" height="25" rx="4"/>
  <text class="small" x="1185.0" y="170.5" text-anchor="middle" style="font-size:12px">rights + decisions</text>
  <rect class="inner" x="1082" y="191" width="206" height="25" rx="4"/>
  <text class="small" x="1185.0" y="207.5" text-anchor="middle" style="font-size:12px">current bindings</text>
  <rect class="inner" x="1082" y="228" width="206" height="25" rx="4"/>
  <text class="small" x="1185.0" y="245.0" text-anchor="middle" style="font-size:13px">no blockers</text>
  <rect class="box" x="1060" y="360" width="250" height="180" rx="8"/>
  <text class="label" x="1185.0" y="402" text-anchor="middle" style="font-size:18px">Release + capsule</text>
  <rect class="inner" x="1082" y="424" width="206" height="25" rx="4"/>
  <text class="small" x="1185.0" y="440.5" text-anchor="middle" style="font-size:12px">promotion record</text>
  <rect class="inner" x="1082" y="461" width="206" height="25" rx="4"/>
  <text class="small" x="1185.0" y="477.5" text-anchor="middle" style="font-size:12px">portable evidence</text>
  <rect class="inner" x="1082" y="498" width="206" height="25" rx="4"/>
  <text class="small" x="1185.0" y="515.0" text-anchor="middle" style="font-size:13px">reproduction</text>
  <path class="line" d="M280 150 L376 150"/>
  <path class="line" d="M165 230 L165 366"/>
  <path class="line" d="M280 450 L330 450 L330 210 L380 210"/>
  <path class="line" d="M280 450 L376 450"/>
  <path class="accentLine" d="M630 160 L675 160 L675 260 L716 260"/>
  <path class="accentLine" d="M630 450 L675 450 L675 340 L716 340"/>
  <path class="accentLine" d="M980 260 L1020 260 L1020 180 L1056 180"/>
  <path class="accentLine" d="M1185 270 L1185 356"/>
</svg>
