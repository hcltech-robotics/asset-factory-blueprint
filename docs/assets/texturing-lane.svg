  <text class="small" x="1184.0" y="309.5" text-anchor="middle" style="font-size:13px">VLM review</text>
  <rect class="box" x="420" y="420" width="520" height="150" rx="8"/>
  <text class="label" x="680.0" y="462" text-anchor="middle">Sources</text>
  <rect class="inner" x="442" y="484" width="476" height="18" rx="4"/>
