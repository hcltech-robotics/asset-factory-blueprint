  <text class="small" x="176.0" y="309.5" text-anchor="middle" style="font-size:13px">map policy</text>
  <path class="line" d="M292 235 L308 235"/>
  <rect class="box" x="312" y="120" width="232" height="230" rx="8"/>
  <text class="label" x="428.0" y="162" text-anchor="middle">Prompting</text>
