<svg xmlns="http://www.w3.org/2000/svg" width="1360" height="620" viewBox="0 0 1360 620" role="img" aria-labelledby="title desc">
  <title id="title">Governance release decision</title>
  <desc id="desc">Current rights, technical gates, task-fitness evidence and a bound operator decision form an AND gate whose result is approved or blocked and is invalidated by any run, package, Profile, scope or expiry change.</desc>
  <defs>
    <style>
      .bg { fill: transparent; }
      .box { fill: #0a100c; stroke: #3d4a42; stroke-width: 2; }
      .boxHot { fill: #0b1608; stroke: #76b900; stroke-width: 2.3; }
      .boxAccent { fill: #160929; stroke: #5f1ebe; stroke-width: 2.3; }
      .inner { fill: #0d130f; stroke: #7d8780; stroke-width: 1.9; }
      .innerHot { fill: #0d1809; stroke: #76b900; stroke-width: 1.9; }
      .innerAccent { fill: #1b0c31; stroke: #5f1ebe; stroke-width: 1.9; }
      .label { fill: #edf3ef; font-family: Aptos, Helvetica, sans-serif; font-size: 20px; font-weight: 680; }
      .small { fill: #c6cec8; font-family: Aptos, Helvetica, sans-serif; font-size: 13px; font-weight: 620; }
      .line { stroke: #e6ece8; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .greenLine { stroke: #76b900; stroke-width: 2.4; fill: none; marker-end: url(#arrowGreen); }
      .accentLine { stroke: #5f1ebe; stroke-width: 2.4; fill: none; marker-end: url(#arrowAccent); }
    </style>
    <marker id="arrow" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 1 L 8 4 L 0 7 z" fill="#e6ece8"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 1 L 8 4 L 0 7 z" fill="#76b900"/>
    </marker>
    <marker id="arrowAccent" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 1 L 8 4 L 0 7 z" fill="#5f1ebe"/>
    </marker>
  </defs>
  <rect class="box" x="40" y="70" width="200" height="180" rx="8"/>
  <text class="label" x="140.0" y="112" text-anchor="middle" style="font-size:18px">Source rights</text>
  <rect class="inner" x="62" y="144" width="156" height="34" rx="4"/>
  <text class="small" x="140.0" y="165.5" text-anchor="middle" style="font-size:13px">allowed use</text>
  <rect class="inner" x="62" y="190" width="156" height="34" rx="4"/>
  <text class="small" x="140.0" y="211.0" text-anchor="middle" style="font-size:12px">retention current</text>
  <path d="M140 250 L140 300" style="stroke:#e6ece8;stroke-width:2.2;fill:none"/>
  <circle cx="140" cy="300" r="4" fill="#e6ece8"/>
  <rect class="box" x="270" y="70" width="200" height="180" rx="8"/>
  <text class="label" x="370.0" y="112" text-anchor="middle" style="font-size:18px">Technical gates</text>
  <rect class="inner" x="292" y="144" width="156" height="34" rx="4"/>
  <text class="small" x="370.0" y="165.0" text-anchor="middle" style="font-size:12px">graph + package</text>
  <rect class="inner" x="292" y="190" width="156" height="34" rx="4"/>
  <text class="small" x="370.0" y="211.5" text-anchor="middle" style="font-size:13px">runtime gate</text>
  <path d="M370 250 L370 300" style="stroke:#5f1ebe;stroke-width:2.2;fill:none"/>
  <circle cx="370" cy="300" r="4" fill="#5f1ebe"/>
  <rect class="box" x="500" y="70" width="200" height="180" rx="8"/>
  <text class="label" x="600.0" y="112" text-anchor="middle" style="font-size:18px">Task evidence</text>
  <rect class="inner" x="522" y="144" width="156" height="34" rx="4"/>
  <text class="small" x="600.0" y="165.0" text-anchor="middle" style="font-size:12px">approved protocol</text>
  <rect class="inner" x="522" y="190" width="156" height="34" rx="4"/>
  <text class="small" x="600.0" y="211.0" text-anchor="middle" style="font-size:12px">measured fitness</text>
  <path d="M600 250 L600 300" style="stroke:#e6ece8;stroke-width:2.2;fill:none"/>
  <circle cx="600" cy="300" r="4" fill="#e6ece8"/>
  <rect class="box" x="730" y="70" width="200" height="180" rx="8"/>
  <text class="label" x="830.0" y="112" text-anchor="middle" style="font-size:18px">Operator approval</text>
  <rect class="inner" x="752" y="144" width="156" height="34" rx="4"/>
  <text class="small" x="830.0" y="165.5" text-anchor="middle" style="font-size:13px">scope bound</text>
  <rect class="inner" x="752" y="190" width="156" height="34" rx="4"/>
  <text class="small" x="830.0" y="211.5" text-anchor="middle" style="font-size:13px">not expired</text>
  <path d="M830 250 L830 300" style="stroke:#e6ece8;stroke-width:2.2;fill:none"/>
  <circle cx="830" cy="300" r="4" fill="#e6ece8"/>
  <path d="M140 300 L960 300" style="stroke:#e6ece8;stroke-width:2.2;fill:none"/>
  <rect class="boxAccent" x="970" y="190" width="80" height="80" rx="8"/>
  <text class="label" x="1010.0" y="224" text-anchor="middle" style="font-size:16px">AND</text>
  <path class="accentLine" d="M960 300 L960 230 L966 230"/>
  <rect class="boxAccent" x="1100" y="80" width="220" height="230" rx="8"/>
  <text class="label" x="1210.0" y="122" text-anchor="middle" style="font-size:18px">Release decision</text>
  <rect class="inner" x="1122" y="156" width="176" height="34" rx="4"/>
  <text class="small" x="1210.0" y="177.0" text-anchor="middle" style="font-size:12px">evidence current</text>
  <rect class="inner" x="1122" y="202" width="176" height="34" rx="4"/>
  <text class="small" x="1210.0" y="223.5" text-anchor="middle" style="font-size:13px">bindings match</text>
  <rect class="innerAccent" x="1122" y="248" width="176" height="34" rx="4"/>
  <text class="small" x="1210.0" y="269.5" text-anchor="middle" style="font-size:13px">no blockers</text>
  <path class="accentLine" d="M1050 230 L1096 230"/>
  <rect class="box" x="50" y="430" width="280" height="120" rx="8"/>
  <text class="label" x="190.0" y="472" text-anchor="middle" style="font-size:18px">Review-required claim</text>
  <rect class="inner" x="72" y="494" width="236" height="16" rx="4"/>
  <text class="small" x="190.0" y="505.0" text-anchor="middle" style="font-size:10px">remains a proposal</text>
  <rect class="inner" x="72" y="518" width="236" height="16" rx="4"/>
  <text class="small" x="190.0" y="529.0" text-anchor="middle" style="font-size:10px">operator decision</text>
  <path class="accentLine" d="M190 430 L190 380 L830 380 L830 254"/>
  <rect class="boxAccent" x="430" y="430" width="250" height="120" rx="8"/>
  <text class="label" x="555.0" y="472" text-anchor="middle" style="font-size:18px">Approved</text>
  <rect class="inner" x="452" y="497" width="206" height="34" rx="4"/>
  <text class="small" x="555.0" y="518.5" text-anchor="middle" style="font-size:13px">released: true</text>
  <rect class="box" x="730" y="430" width="250" height="120" rx="8"/>
  <text class="label" x="855.0" y="472" text-anchor="middle" style="font-size:18px">Blocked</text>
  <rect class="inner" x="752" y="497" width="206" height="34" rx="4"/>
  <text class="small" x="855.0" y="518.0" text-anchor="middle" style="font-size:12px">named conditions</text>
  <rect class="box" x="1110" y="340" width="200" height="70" rx="8"/>
  <text class="label" x="1210.0" y="374" text-anchor="middle" style="font-size:16px">One outcome</text>
  <path class="accentLine" d="M1210 310 L1210 336"/>
  <path d="M1210 410 L1210 415 L555 415" style="stroke:#e6ece8;stroke-width:2.2;fill:none"/>
  <path class="accentLine" d="M555 415 L555 426"/>
  <path class="line" d="M855 415 L855 426"/>
  <circle cx="555" cy="415" r="4" fill="#5f1ebe"/>
  <circle cx="855" cy="415" r="4" fill="#e6ece8"/>
  <rect class="box" x="1050" y="445" width="280" height="120" rx="8"/>
  <text class="label" x="1190.0" y="487" text-anchor="middle" style="font-size:17px">Re-evaluate on change</text>
  <rect class="inner" x="1072" y="509" width="236" height="16" rx="4"/>
  <text class="small" x="1190.0" y="520.0" text-anchor="middle" style="font-size:10px">run / package</text>
  <rect class="inner" x="1072" y="533" width="236" height="16" rx="4"/>
  <text class="small" x="1190.0" y="544.0" text-anchor="middle" style="font-size:10px">Profile / scope</text>
  <rect class="inner" x="1072" y="557" width="236" height="16" rx="4"/>
  <text class="small" x="1190.0" y="568.0" text-anchor="middle" style="font-size:10px">expiry</text>
  <path class="accentLine" d="M1190 445 L1340 445 L1340 45 L1010 45 L1010 186"/>
</svg>
