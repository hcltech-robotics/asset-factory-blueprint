  <text class="label" x="1142.0" y="414" text-anchor="middle" style="font-size:16px">Verify</text>
  <path class="line" d="M1204 417 L1208 417"/>
  <rect class="box" x="1212" y="380" width="124" height="74" rx="8"/>
