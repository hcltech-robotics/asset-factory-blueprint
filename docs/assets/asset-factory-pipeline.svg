<svg xmlns="http://www.w3.org/2000/svg" width="1360" height="620" viewBox="0 0 1360 620" role="img" aria-labelledby="title desc">
  <title id="title">The seven-stage pipeline</title>
  <desc id="desc">Pre-pipeline intake feeds seven content stages into downstream extensions; every stage passes formal gates and a VLM sign-off.</desc>
  <defs>
    <style>
      .bg { fill: transparent; }
      .box { fill: #0a100c; stroke: #3d4a42; stroke-width: 2; }
      .boxHot { fill: #0b1608; stroke: #76b900; stroke-width: 2.3; }
      .boxAccent { fill: #160929; stroke: #5f1ebe; stroke-width: 2.3; }
      .inner { fill: #0d130f; stroke: #7d8780; stroke-width: 1.9; }
      .innerHot { fill: #0d1809; stroke: #76b900; stroke-width: 1.9; }
      .innerAccent { fill: #1b0c31; stroke: #5f1ebe; stroke-width: 1.9; }
      .label { fill: #edf3ef; font-family: Aptos, Helvetica, sans-serif; font-size: 20px; font-weight: 680; }
      .small { fill: #c6cec8; font-family: Aptos, Helvetica, sans-serif; font-size: 13px; font-weight: 620; }
      .line { stroke: #e6ece8; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .greenLine { stroke: #76b900; stroke-width: 2.4; fill: none; marker-end: url(#arrowGreen); }
      .accentLine { stroke: #5f1ebe; stroke-width: 2.4; fill: none; marker-end: url(#arrowAccent); }
    </style>
    <marker id="arrow" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 1 L 8 4 L 0 7 z" fill="#e6ece8"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 1 L 8 4 L 0 7 z" fill="#76b900"/>
    </marker>
    <marker id="arrowAccent" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 1 L 8 4 L 0 7 z" fill="#5f1ebe"/>
    </marker>
  </defs>
  <rect class="box" x="30" y="74" width="180" height="212" rx="8"/>
  <text class="label" x="120.0" y="116" text-anchor="middle" style="font-size:17px">Pre-pipeline</text>
  <rect class="inner" x="52" y="164" width="136" height="34" rx="4"/>
  <text class="small" x="120.0" y="185.5" text-anchor="middle" style="font-size:13px">intake</text>
  <rect class="innerAccent" x="52" y="210" width="136" height="34" rx="4"/>
  <text class="small" x="120.0" y="231.0" text-anchor="middle" style="font-size:12px">source ingestion</text>
  <rect class="boxAccent" x="222" y="74" width="131" height="212" rx="8"/>
  <text class="label" x="287.5" y="116" text-anchor="middle" style="font-size:16px">1 Reconstruct</text>
  <rect class="inner" x="232" y="164" width="111" height="34" rx="4"/>
  <text class="small" x="287.5" y="185.5" text-anchor="middle" style="font-size:13px">optional</text>
  <rect class="inner" x="232" y="210" width="111" height="34" rx="4"/>
  <text class="small" x="287.5" y="231.0" text-anchor="middle" style="font-size:12px">mesh from views</text>
  <path class="line" d="M353 180 L357 180"/>
  <rect class="box" x="361" y="74" width="131" height="212" rx="8"/>
  <text class="label" x="426.5" y="116" text-anchor="middle" style="font-size:16px">2 Segment</text>
  <rect class="inner" x="371" y="164" width="111" height="34" rx="4"/>
  <text class="small" x="426.5" y="185.5" text-anchor="middle" style="font-size:13px">masks</text>
  <rect class="inner" x="371" y="210" width="111" height="34" rx="4"/>
  <text class="small" x="426.5" y="231.5" text-anchor="middle" style="font-size:13px">semantics</text>
  <path class="line" d="M492 180 L496 180"/>
  <rect class="box" x="500" y="74" width="131" height="212" rx="8"/>
  <text class="label" x="565.5" y="116" text-anchor="middle" style="font-size:16px">3 Materials</text>
  <rect class="inner" x="510" y="164" width="111" height="34" rx="4"/>
  <text class="small" x="565.5" y="185.5" text-anchor="middle" style="font-size:13px">classes</text>
  <rect class="inner" x="510" y="210" width="111" height="34" rx="4"/>
  <text class="small" x="565.5" y="231.5" text-anchor="middle" style="font-size:13px">physical props</text>
  <path class="line" d="M631 180 L635 180"/>
  <rect class="box" x="639" y="74" width="131" height="212" rx="8"/>
  <text class="label" x="704.5" y="116" text-anchor="middle" style="font-size:16px">4 Texture</text>
  <rect class="inner" x="649" y="164" width="111" height="34" rx="4"/>
  <text class="small" x="704.5" y="185.5" text-anchor="middle" style="font-size:13px">PBR maps</text>
  <rect class="inner" x="649" y="210" width="111" height="34" rx="4"/>
  <text class="small" x="704.5" y="231.5" text-anchor="middle" style="font-size:13px">decals</text>
  <path class="line" d="M770 180 L774 180"/>
  <rect class="box" x="778" y="74" width="131" height="212" rx="8"/>
  <text class="label" x="843.5" y="116" text-anchor="middle" style="font-size:16px">5 Physics</text>
  <rect class="inner" x="788" y="164" width="111" height="34" rx="4"/>
  <text class="small" x="843.5" y="185.5" text-anchor="middle" style="font-size:13px">joints</text>
  <rect class="inner" x="788" y="210" width="111" height="34" rx="4"/>
  <text class="small" x="843.5" y="231.5" text-anchor="middle" style="font-size:13px">grasps</text>
  <path class="line" d="M909 180 L913 180"/>
  <rect class="boxAccent" x="917" y="74" width="131" height="212" rx="8"/>
  <text class="label" x="982.5" y="116" text-anchor="middle" style="font-size:16px">6 Nonvisual</text>
  <rect class="inner" x="927" y="164" width="111" height="34" rx="4"/>
  <text class="small" x="982.5" y="185.5" text-anchor="middle" style="font-size:13px">optional</text>
  <rect class="inner" x="927" y="210" width="111" height="34" rx="4"/>
  <text class="small" x="982.5" y="231.0" text-anchor="middle" style="font-size:12px">thermal, acoustic</text>
  <path class="line" d="M1048 180 L1052 180"/>
  <rect class="box" x="1056" y="74" width="131" height="212" rx="8"/>
  <text class="label" x="1121.5" y="116" text-anchor="middle" style="font-size:16px">7 Verify</text>
  <rect class="inner" x="1066" y="164" width="111" height="34" rx="4"/>
  <text class="small" x="1121.5" y="185.5" text-anchor="middle" style="font-size:13px">package</text>
  <rect class="inner" x="1066" y="210" width="111" height="34" rx="4"/>
  <text class="small" x="1121.5" y="231.5" text-anchor="middle" style="font-size:13px">USD gates</text>
  <path class="line" d="M210 180 L218 180"/>
  <rect class="box" x="1200" y="74" width="140" height="212" rx="8"/>
  <text class="label" x="1270.0" y="116" text-anchor="middle" style="font-size:17px">Downstream</text>
  <rect class="inner" x="1210" y="164" width="120" height="34" rx="4"/>
  <text class="small" x="1270.0" y="185.5" text-anchor="middle" style="font-size:13px">RL contracts</text>
  <rect class="inner" x="1210" y="210" width="120" height="34" rx="4"/>
  <text class="small" x="1270.0" y="231.5" text-anchor="middle" style="font-size:13px">layout sweeps</text>
  <path class="line" d="M1187 180 L1196 180"/>
  <rect class="boxAccent" x="404" y="400" width="600" height="150" rx="8"/>
  <text class="label" x="704.5" y="442" text-anchor="middle">Every stage</text>
  <rect class="inner" x="426" y="464" width="556" height="18" rx="4"/>
  <text class="small" x="704.5" y="477.0" text-anchor="middle" style="font-size:12px">formal gates</text>
  <rect class="innerAccent" x="426" y="490" width="556" height="18" rx="4"/>
  <text class="small" x="704.5" y="503.0" text-anchor="middle" style="font-size:12px">VLM sign-off</text>
  <rect class="innerAccent" x="426" y="516" width="556" height="18" rx="4"/>
  <text class="small" x="704.5" y="529.0" text-anchor="middle" style="font-size:12px">fix or escalate</text>
  <path class="accentLine" d="M704 286 L704 400"/>
</svg>
