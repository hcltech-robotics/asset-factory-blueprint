<svg xmlns="http://www.w3.org/2000/svg" width="1360" height="620" viewBox="0 0 1360 620" role="img" aria-labelledby="title desc">
  <title id="title">The eight-stage pipeline</title>
  <desc id="desc">Pre-pipeline intake feeds eight content stages into downstream extensions; every stage passes formal gates and its configured review.</desc>
  <defs>
    <style>
      .bg { fill: transparent; }
      .box { fill: #222229; stroke: #3b3e49; stroke-width: 2; }
      .boxHot { fill: #292931; stroke: #3c91ff; stroke-width: 2.3; }
      .inner { fill: #2f3039; stroke: #526476; stroke-width: 1.9; }
      .innerHot { fill: #292931; stroke: #3c91ff; stroke-width: 1.9; }
      .innerAccent { fill: #2f3039; stroke: #8c69f0; stroke-width: 1.9; }
      .label { fill: #f0f2f8; font-family: Aptos, Helvetica, sans-serif; font-size: 20px; font-weight: 680; }
      .small { fill: #c8d2dd; font-family: Aptos, Helvetica, sans-serif; font-size: 13px; font-weight: 620; }
      .line { stroke: #4bc3af; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .primaryLine { stroke: #3c91ff; stroke-width: 2.4; fill: none; marker-end: url(#arrowPrimary); }
      .accentLine { stroke: #8c69f0; stroke-width: 2.4; fill: none; marker-end: url(#arrowAccent); }
    </style>
    <marker id="arrow" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 1 L 8 4 L 0 7 z" fill="#4bc3af"/>
    </marker>
    <marker id="arrowPrimary" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 1 L 8 4 L 0 7 z" fill="#3c91ff"/>
    </marker>
    <marker id="arrowAccent" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 1 L 8 4 L 0 7 z" fill="#8c69f0"/>
    </marker>
  </defs>
  <rect class="box" x="30" y="74" width="180" height="212" rx="8"/>
  <text class="label" x="120.0" y="116" text-anchor="middle" style="font-size:17px">Pre-pipeline</text>
  <rect class="inner" x="52" y="164" width="136" height="34" rx="4"/>
  <text class="small" x="120.0" y="185.5" text-anchor="middle" style="font-size:13px">intake</text>
  <rect class="innerAccent" x="52" y="210" width="136" height="34" rx="4"/>
  <text class="small" x="120.0" y="231.0" text-anchor="middle" style="font-size:12px">source ingestion</text>
  <rect class="boxHot" x="222" y="74" width="115" height="212" rx="8"/>
  <text class="label" x="279.5" y="116" text-anchor="middle" style="font-size:16px">1 Reconstruct</text>
  <rect class="inner" x="232" y="164" width="95" height="34" rx="4"/>
  <text class="small" x="279.5" y="185.5" text-anchor="middle" style="font-size:13px">optional</text>
  <rect class="inner" x="232" y="210" width="95" height="34" rx="4"/>
  <text class="small" x="279.5" y="231.0" text-anchor="middle" style="font-size:12px">mesh from views</text>
  <path class="line" d="M337 180 L339 180"/>
  <rect class="boxHot" x="343" y="74" width="115" height="212" rx="8"/>
  <text class="label" x="400.5" y="116" text-anchor="middle" style="font-size:16px">2 Mesh verify</text>
  <rect class="innerAccent" x="353" y="164" width="95" height="34" rx="4"/>
  <text class="small" x="400.5" y="185.5" text-anchor="middle" style="font-size:13px">tool + vision</text>
  <rect class="inner" x="353" y="210" width="95" height="34" rx="4"/>
  <text class="small" x="400.5" y="231.5" text-anchor="middle" style="font-size:13px">promotion gate</text>
  <path class="line" d="M458 180 L460 180"/>
  <rect class="box" x="464" y="74" width="115" height="212" rx="8"/>
  <text class="label" x="521.5" y="116" text-anchor="middle" style="font-size:16px">3 Segment</text>
  <rect class="inner" x="474" y="164" width="95" height="34" rx="4"/>
  <text class="small" x="521.5" y="185.5" text-anchor="middle" style="font-size:13px">masks</text>
  <rect class="inner" x="474" y="210" width="95" height="34" rx="4"/>
  <text class="small" x="521.5" y="231.5" text-anchor="middle" style="font-size:13px">semantics</text>
  <path class="line" d="M579 180 L581 180"/>
  <rect class="box" x="585" y="74" width="115" height="212" rx="8"/>
  <text class="label" x="642.5" y="116" text-anchor="middle" style="font-size:16px">4 Materials</text>
  <rect class="inner" x="595" y="164" width="95" height="34" rx="4"/>
  <text class="small" x="642.5" y="185.5" text-anchor="middle" style="font-size:13px">classes</text>
  <rect class="inner" x="595" y="210" width="95" height="34" rx="4"/>
  <text class="small" x="642.5" y="231.5" text-anchor="middle" style="font-size:13px">physical props</text>
  <path class="line" d="M700 180 L702 180"/>
  <rect class="box" x="706" y="74" width="115" height="212" rx="8"/>
  <text class="label" x="763.5" y="116" text-anchor="middle" style="font-size:16px">5 Texture</text>
  <rect class="inner" x="716" y="164" width="95" height="34" rx="4"/>
  <text class="small" x="763.5" y="185.5" text-anchor="middle" style="font-size:13px">PBR maps</text>
  <rect class="inner" x="716" y="210" width="95" height="34" rx="4"/>
  <text class="small" x="763.5" y="231.5" text-anchor="middle" style="font-size:13px">decals</text>
  <path class="line" d="M821 180 L823 180"/>
  <rect class="box" x="827" y="74" width="115" height="212" rx="8"/>
  <text class="label" x="884.5" y="116" text-anchor="middle" style="font-size:16px">6 Physics</text>
  <rect class="inner" x="837" y="164" width="95" height="34" rx="4"/>
  <text class="small" x="884.5" y="185.5" text-anchor="middle" style="font-size:13px">joints</text>
  <rect class="inner" x="837" y="210" width="95" height="34" rx="4"/>
  <text class="small" x="884.5" y="231.5" text-anchor="middle" style="font-size:13px">grasps</text>
  <path class="line" d="M942 180 L944 180"/>
  <rect class="boxHot" x="948" y="74" width="115" height="212" rx="8"/>
  <text class="label" x="1005.5" y="116" text-anchor="middle" style="font-size:16px">7 Nonvisual</text>
  <rect class="inner" x="958" y="164" width="95" height="34" rx="4"/>
  <text class="small" x="1005.5" y="185.5" text-anchor="middle" style="font-size:13px">optional</text>
  <rect class="inner" x="958" y="210" width="95" height="34" rx="4"/>
  <text class="small" x="1005.5" y="231.0" text-anchor="middle" style="font-size:12px">thermal, acoustic</text>
  <path class="line" d="M1063 180 L1065 180"/>
  <rect class="box" x="1069" y="74" width="115" height="212" rx="8"/>
  <text class="label" x="1126.5" y="116" text-anchor="middle" style="font-size:16px">8 SimReady</text>
  <rect class="inner" x="1079" y="164" width="95" height="34" rx="4"/>
  <text class="small" x="1126.5" y="185.5" text-anchor="middle" style="font-size:13px">package</text>
  <rect class="inner" x="1079" y="210" width="95" height="34" rx="4"/>
  <text class="small" x="1126.5" y="231.5" text-anchor="middle" style="font-size:13px">USD gates</text>
  <path class="line" d="M210 180 L218 180"/>
  <rect class="box" x="1200" y="74" width="140" height="212" rx="8"/>
  <text class="label" x="1270.0" y="116" text-anchor="middle" style="font-size:17px">Downstream</text>
  <rect class="inner" x="1210" y="164" width="120" height="34" rx="4"/>
  <text class="small" x="1270.0" y="185.5" text-anchor="middle" style="font-size:13px">RL contracts</text>
  <rect class="inner" x="1210" y="210" width="120" height="34" rx="4"/>
  <text class="small" x="1270.0" y="231.5" text-anchor="middle" style="font-size:13px">layout sweeps</text>
  <path class="line" d="M1184 180 L1196 180"/>
  <rect class="boxHot" x="403" y="400" width="600" height="150" rx="8"/>
  <text class="label" x="703.0" y="442" text-anchor="middle">Every stage</text>
  <rect class="inner" x="425" y="464" width="556" height="18" rx="4"/>
  <text class="small" x="703.0" y="477.0" text-anchor="middle" style="font-size:12px">formal gates</text>
  <rect class="innerAccent" x="425" y="490" width="556" height="18" rx="4"/>
  <text class="small" x="703.0" y="503.0" text-anchor="middle" style="font-size:12px">vision review</text>
  <rect class="innerAccent" x="425" y="516" width="556" height="18" rx="4"/>
  <text class="small" x="703.0" y="529.0" text-anchor="middle" style="font-size:12px">fix or escalate</text>
  <path class="accentLine" d="M703 286 L703 400"/>
</svg>
