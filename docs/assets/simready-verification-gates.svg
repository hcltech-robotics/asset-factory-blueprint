<svg xmlns="http://www.w3.org/2000/svg" width="1360" height="620" viewBox="0 0 1360 620" role="img" aria-labelledby="title desc">
  <title id="title">SimReady verification gates</title>
  <desc id="desc">Layer stack, package, runtime load and performance checks feed the promotion decision, with a final visual review.</desc>
  <defs>
    <style>
      .bg { fill: transparent; }
      .box { fill: #222229; stroke: #3b3e49; stroke-width: 2; }
      .boxHot { fill: #292931; stroke: #3c91ff; stroke-width: 2.3; }
      .inner { fill: #2f3039; stroke: #526476; stroke-width: 1.9; }
      .innerHot { fill: #292931; stroke: #3c91ff; stroke-width: 1.9; }
      .innerAccent { fill: #2f3039; stroke: #8c69f0; stroke-width: 1.9; }
      .label { fill: #f0f2f8; font-family: Aptos, Helvetica, sans-serif; font-size: 20px; font-weight: 680; }
      .small { fill: #c8d2dd; font-family: Aptos, Helvetica, sans-serif; font-size: 13px; font-weight: 620; }
      .line { stroke: #4bc3af; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .primaryLine { stroke: #3c91ff; stroke-width: 2.4; fill: none; marker-end: url(#arrowPrimary); }
      .accentLine { stroke: #8c69f0; stroke-width: 2.4; fill: none; marker-end: url(#arrowAccent); }
    </style>
    <marker id="arrow" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 1 L 8 4 L 0 7 z" fill="#4bc3af"/>
    </marker>
    <marker id="arrowPrimary" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 1 L 8 4 L 0 7 z" fill="#3c91ff"/>
    </marker>
    <marker id="arrowAccent" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 1 L 8 4 L 0 7 z" fill="#8c69f0"/>
    </marker>
  </defs>
  <rect class="box" x="60" y="120" width="232" height="230" rx="8"/>
  <text class="label" x="176.0" y="162" text-anchor="middle">Layer stack</text>
  <rect class="inner" x="82" y="196" width="188" height="34" rx="4"/>
  <text class="small" x="176.0" y="217.5" text-anchor="middle" style="font-size:13px">composition</text>
  <rect class="inner" x="82" y="242" width="188" height="34" rx="4"/>
  <text class="small" x="176.0" y="263.5" text-anchor="middle" style="font-size:13px">references</text>
  <rect class="inner" x="82" y="288" width="188" height="34" rx="4"/>
  <text class="small" x="176.0" y="309.5" text-anchor="middle" style="font-size:13px">defaultPrim</text>
  <path class="line" d="M292 235 L308 235"/>
  <rect class="box" x="312" y="120" width="232" height="230" rx="8"/>
  <text class="label" x="428.0" y="162" text-anchor="middle">Package checks</text>
  <rect class="inner" x="334" y="196" width="188" height="34" rx="4"/>
  <text class="small" x="428.0" y="217.5" text-anchor="middle" style="font-size:13px">bindings</text>
  <rect class="inner" x="334" y="242" width="188" height="34" rx="4"/>
  <text class="small" x="428.0" y="263.5" text-anchor="middle" style="font-size:13px">units + axis</text>
  <rect class="inner" x="334" y="288" width="188" height="34" rx="4"/>
  <text class="small" x="428.0" y="309.5" text-anchor="middle" style="font-size:13px">self contained</text>
  <path class="line" d="M544 235 L560 235"/>
  <rect class="box" x="564" y="120" width="232" height="230" rx="8"/>
  <text class="label" x="680.0" y="162" text-anchor="middle">Runtime load</text>
  <rect class="inner" x="586" y="196" width="188" height="34" rx="4"/>
  <text class="small" x="680.0" y="217.5" text-anchor="middle" style="font-size:13px">Isaac Sim</text>
  <rect class="inner" x="586" y="242" width="188" height="34" rx="4"/>
  <text class="small" x="680.0" y="263.5" text-anchor="middle" style="font-size:13px">prim counts</text>
  <rect class="inner" x="586" y="288" width="188" height="34" rx="4"/>
  <text class="small" x="680.0" y="309.5" text-anchor="middle" style="font-size:13px">load report</text>
  <path class="line" d="M796 235 L812 235"/>
  <rect class="box" x="816" y="120" width="232" height="230" rx="8"/>
  <text class="label" x="932.0" y="162" text-anchor="middle">Performance</text>
  <rect class="inner" x="838" y="219" width="188" height="34" rx="4"/>
  <text class="small" x="932.0" y="240.5" text-anchor="middle" style="font-size:13px">budget</text>
  <rect class="inner" x="838" y="265" width="188" height="34" rx="4"/>
  <text class="small" x="932.0" y="286.5" text-anchor="middle" style="font-size:13px">measurements</text>
  <path class="accentLine" d="M1048 235 L1064 235"/>
  <rect class="boxHot" x="1068" y="120" width="232" height="230" rx="8"/>
  <text class="label" x="1184.0" y="162" text-anchor="middle">Decision</text>
  <rect class="innerAccent" x="1090" y="196" width="188" height="34" rx="4"/>
  <text class="small" x="1184.0" y="217.5" text-anchor="middle" style="font-size:13px">promote</text>
  <rect class="inner" x="1090" y="242" width="188" height="34" rx="4"/>
  <text class="small" x="1184.0" y="263.5" text-anchor="middle" style="font-size:13px">review</text>
  <rect class="inner" x="1090" y="288" width="188" height="34" rx="4"/>
  <text class="small" x="1184.0" y="309.0" text-anchor="middle" style="font-size:12px">block with reasons</text>
  <rect class="boxHot" x="420" y="420" width="520" height="130" rx="8"/>
  <text class="label" x="680.0" y="462" text-anchor="middle">Final visual review</text>
  <rect class="innerAccent" x="442" y="492" width="476" height="34" rx="4"/>
  <text class="small" x="680.0" y="512.0" text-anchor="middle" style="font-size:10px">packaged render against source photos</text>
  <path class="accentLine" d="M680 420 L680 380 L1184 380 L1184 350"/>
</svg>
