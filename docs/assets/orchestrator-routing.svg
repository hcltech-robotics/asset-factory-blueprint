<svg xmlns="http://www.w3.org/2000/svg" width="1360" height="620" viewBox="0 0 1360 620" role="img" aria-labelledby="title desc">
  <title id="title">Orchestrator routing</title>
  <desc id="desc">A run request is closed over stage contracts and policies, split into source and output routes, then recorded as a dependency-complete run plan with gates and stop reasons.</desc>
  <defs>
    <style>
      .bg { fill: transparent; }
      .box { fill: #222229; stroke: #3b3e49; stroke-width: 2; }
      .boxHot { fill: #292931; stroke: #3c91ff; stroke-width: 2.3; }
      .inner { fill: #2f3039; stroke: #526476; stroke-width: 1.9; }
      .innerHot { fill: #292931; stroke: #3c91ff; stroke-width: 1.9; }
      .innerAccent { fill: #2f3039; stroke: #8c69f0; stroke-width: 1.9; }
      .label { fill: #f0f2f8; font-family: Aptos, Helvetica, sans-serif; font-size: 20px; font-weight: 680; }
      .small { fill: #c8d2dd; font-family: Aptos, Helvetica, sans-serif; font-size: 13px; font-weight: 620; }
      .line { stroke: #4bc3af; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .primaryLine { stroke: #3c91ff; stroke-width: 2.4; fill: none; marker-end: url(#arrowPrimary); }
      .accentLine { stroke: #8c69f0; stroke-width: 2.4; fill: none; marker-end: url(#arrowAccent); }
    </style>
    <marker id="arrow" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 1 L 8 4 L 0 7 z" fill="#4bc3af"/>
    </marker>
    <marker id="arrowPrimary" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 1 L 8 4 L 0 7 z" fill="#3c91ff"/>
    </marker>
    <marker id="arrowAccent" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 1 L 8 4 L 0 7 z" fill="#8c69f0"/>
    </marker>
  </defs>
  <rect class="box" x="40" y="205" width="240" height="190" rx="8"/>
  <text class="label" x="160.0" y="247" text-anchor="middle">Run request</text>
  <rect class="inner" x="62" y="270" width="196" height="28" rx="4"/>
  <text class="small" x="160.0" y="288.5" text-anchor="middle" style="font-size:13px">source types</text>
  <rect class="inner" x="62" y="310" width="196" height="28" rx="4"/>
  <text class="small" x="160.0" y="328.0" text-anchor="middle" style="font-size:12px">requested outputs</text>
  <rect class="inner" x="62" y="350" width="196" height="28" rx="4"/>
  <text class="small" x="160.0" y="368.5" text-anchor="middle" style="font-size:13px">constraints</text>
  <rect class="boxHot" x="360" y="180" width="280" height="230" rx="8"/>
  <text class="label" x="500.0" y="222" text-anchor="middle">Dependency closure</text>
  <rect class="innerAccent" x="382" y="256" width="236" height="34" rx="4"/>
  <text class="small" x="500.0" y="277.0" text-anchor="middle" style="font-size:12px">stage contracts</text>
  <rect class="inner" x="382" y="302" width="236" height="34" rx="4"/>
  <text class="small" x="500.0" y="323.0" text-anchor="middle" style="font-size:12px">inputs + outputs</text>
  <rect class="inner" x="382" y="348" width="236" height="34" rx="4"/>
  <text class="small" x="500.0" y="369.0" text-anchor="middle" style="font-size:12px">policy + capacity</text>
  <rect class="box" x="730" y="30" width="310" height="160" rx="8"/>
  <text class="label" x="885.0" y="72" text-anchor="middle">Asset sources</text>
  <rect class="inner" x="752" y="94" width="266" height="21" rx="4"/>
  <text class="small" x="885.0" y="108.5" text-anchor="middle" style="font-size:12px">CAD / USD / visual</text>
  <rect class="inner" x="752" y="123" width="266" height="21" rx="4"/>
  <text class="small" x="885.0" y="138.0" text-anchor="middle" style="font-size:13px">reconstruction</text>
  <rect class="inner" x="752" y="152" width="266" height="21" rx="4"/>
  <text class="small" x="885.0" y="166.5" text-anchor="middle" style="font-size:12px">segment + material</text>
  <rect class="box" x="730" y="220" width="310" height="160" rx="8"/>
  <text class="label" x="885.0" y="262" text-anchor="middle">Robot sources</text>
  <rect class="inner" x="752" y="284" width="266" height="21" rx="4"/>
  <text class="small" x="885.0" y="298.5" text-anchor="middle" style="font-size:12px">URDF / MJCF / XML</text>
  <rect class="inner" x="752" y="313" width="266" height="21" rx="4"/>
  <text class="small" x="885.0" y="328.0" text-anchor="middle" style="font-size:13px">reconstruction</text>
  <rect class="inner" x="752" y="342" width="266" height="21" rx="4"/>
  <text class="small" x="885.0" y="356.5" text-anchor="middle" style="font-size:12px">physics + closure</text>
  <rect class="box" x="730" y="410" width="310" height="160" rx="8"/>
  <text class="label" x="885.0" y="452" text-anchor="middle">Requested outputs</text>
  <rect class="inner" x="752" y="474" width="266" height="21" rx="4"/>
  <text class="small" x="885.0" y="488.0" text-anchor="middle" style="font-size:11px">texture / nonvisual</text>
  <rect class="inner" x="752" y="503" width="266" height="21" rx="4"/>
  <text class="small" x="885.0" y="517.0" text-anchor="middle" style="font-size:11px">SimReady / RL / eval</text>
  <rect class="inner" x="752" y="532" width="266" height="21" rx="4"/>
  <text class="small" x="885.0" y="546.5" text-anchor="middle" style="font-size:12px">target + closure</text>
  <rect class="boxHot" x="1120" y="170" width="200" height="260" rx="8"/>
  <text class="label" x="1220.0" y="212" text-anchor="middle" style="font-size:18px">Run plan</text>
  <rect class="innerAccent" x="1142" y="238" width="156" height="34" rx="4"/>
  <text class="small" x="1220.0" y="259.5" text-anchor="middle" style="font-size:13px">stages + skips</text>
  <rect class="inner" x="1142" y="284" width="156" height="34" rx="4"/>
  <text class="small" x="1220.0" y="305.0" text-anchor="middle" style="font-size:12px">providers + bounds</text>
  <rect class="inner" x="1142" y="330" width="156" height="34" rx="4"/>
  <text class="small" x="1220.0" y="351.0" text-anchor="middle" style="font-size:12px">gates + blockers</text>
  <rect class="inner" x="1142" y="376" width="156" height="34" rx="4"/>
  <text class="small" x="1220.0" y="397.5" text-anchor="middle" style="font-size:13px">attempt paths</text>
  <path class="accentLine" d="M280 300 L356 300"/>
  <path d="M640 295 L685 295 L685 110 L685 490" style="stroke:#4bc3af;stroke-width:2.2;fill:none"/>
  <path d="M1080 110 L1080 490" style="stroke:#4bc3af;stroke-width:2.2;fill:none"/>
  <path class="line" d="M685 110 L726 110"/>
  <path d="M1040 110 L1080 110" style="stroke:#4bc3af;stroke-width:2.2;fill:none"/>
  <circle cx="685" cy="110" r="4" fill="#4bc3af"/>
  <circle cx="1080" cy="110" r="4" fill="#4bc3af"/>
  <path class="line" d="M685 300 L726 300"/>
  <path d="M1040 300 L1080 300" style="stroke:#4bc3af;stroke-width:2.2;fill:none"/>
  <circle cx="685" cy="300" r="4" fill="#4bc3af"/>
  <circle cx="1080" cy="300" r="4" fill="#4bc3af"/>
  <path class="accentLine" d="M685 490 L726 490"/>
  <path d="M1040 490 L1080 490" style="stroke:#8c69f0;stroke-width:2.2;fill:none"/>
  <circle cx="685" cy="490" r="4" fill="#8c69f0"/>
  <circle cx="1080" cy="490" r="4" fill="#8c69f0"/>
  <path class="accentLine" d="M1080 300 L1116 300"/>
  <rect class="box" x="360" y="450" width="280" height="130" rx="8"/>
  <text class="label" x="500.0" y="492" text-anchor="middle" style="font-size:18px">Always selected</text>
  <rect class="inner" x="382" y="514" width="236" height="16" rx="4"/>
  <text class="small" x="500.0" y="525.0" text-anchor="middle" style="font-size:10px">orchestrate + intake</text>
  <rect class="inner" x="382" y="538" width="236" height="16" rx="4"/>
  <text class="small" x="500.0" y="549.0" text-anchor="middle" style="font-size:10px">evaluate + govern</text>
  <rect class="inner" x="382" y="562" width="236" height="16" rx="4"/>
  <text class="small" x="500.0" y="573.0" text-anchor="middle" style="font-size:10px">infrastructure</text>
  <path class="line" d="M500 410 L500 451"/>
</svg>
