<svg xmlns="http://www.w3.org/2000/svg" width="1360" height="620" viewBox="0 0 1360 620" role="img" aria-labelledby="title desc">
  <title id="title">Asset factory architecture</title>
  <desc id="desc">Five blocks from immutable sources through staged proposals, validation and release, with agent control looping under the stages.</desc>
  <defs>
    <style>
      .bg { fill: transparent; }
      .box { fill: #222229; stroke: #3b3e49; stroke-width: 2; }
      .boxHot { fill: #292931; stroke: #3c91ff; stroke-width: 2.3; }
      .inner { fill: #2f3039; stroke: #526476; stroke-width: 1.9; }
      .innerHot { fill: #292931; stroke: #3c91ff; stroke-width: 1.9; }
      .innerAccent { fill: #2f3039; stroke: #8c69f0; stroke-width: 1.9; }
      .label { fill: #f0f2f8; font-family: Aptos, Helvetica, sans-serif; font-size: 20px; font-weight: 680; }
      .small { fill: #c8d2dd; font-family: Aptos, Helvetica, sans-serif; font-size: 13px; font-weight: 620; }
      .line { stroke: #4bc3af; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .primaryLine { stroke: #3c91ff; stroke-width: 2.4; fill: none; marker-end: url(#arrowPrimary); }
      .accentLine { stroke: #8c69f0; stroke-width: 2.4; fill: none; marker-end: url(#arrowAccent); }
    </style>
    <marker id="arrow" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 1 L 8 4 L 0 7 z" fill="#4bc3af"/>
    </marker>
    <marker id="arrowPrimary" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 1 L 8 4 L 0 7 z" fill="#3c91ff"/>
    </marker>
    <marker id="arrowAccent" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 1 L 8 4 L 0 7 z" fill="#8c69f0"/>
    </marker>
  </defs>
  <rect class="box" x="62" y="108" width="222" height="236" rx="8"/>
  <text class="label" x="173.0" y="150" text-anchor="middle">Sources</text>
  <rect class="inner" x="84" y="187" width="178" height="34" rx="4"/>
  <text class="small" x="173.0" y="208.5" text-anchor="middle" style="font-size:13px">CAD / OpenUSD</text>
  <rect class="innerAccent" x="84" y="233" width="178" height="34" rx="4"/>
  <text class="small" x="173.0" y="254.5" text-anchor="middle" style="font-size:13px">photos + video</text>
  <rect class="inner" x="84" y="279" width="178" height="34" rx="4"/>
  <text class="small" x="173.0" y="300.0" text-anchor="middle" style="font-size:12px">robot descriptions</text>
  <path class="line" d="M284 226 L302 226"/>
  <rect class="box" x="306" y="108" width="222" height="236" rx="8"/>
  <text class="label" x="417.0" y="150" text-anchor="middle">Workspace</text>
  <rect class="inner" x="328" y="187" width="178" height="34" rx="4"/>
  <text class="small" x="417.0" y="208.0" text-anchor="middle" style="font-size:12px">immutable copies</text>
  <rect class="inner" x="328" y="233" width="178" height="34" rx="4"/>
  <text class="small" x="417.0" y="254.5" text-anchor="middle" style="font-size:13px">checksums</text>
  <rect class="innerAccent" x="328" y="279" width="178" height="34" rx="4"/>
  <text class="small" x="417.0" y="300.5" text-anchor="middle" style="font-size:13px">manifests</text>
  <path class="line" d="M528 226 L546 226"/>
  <rect class="box" x="550" y="108" width="222" height="236" rx="8"/>
  <text class="label" x="661.0" y="150" text-anchor="middle">Stages</text>
  <rect class="innerAccent" x="572" y="187" width="178" height="34" rx="4"/>
  <text class="small" x="661.0" y="208.5" text-anchor="middle" style="font-size:13px">proposals</text>
  <rect class="inner" x="572" y="233" width="178" height="34" rx="4"/>
  <text class="small" x="661.0" y="254.0" text-anchor="middle" style="font-size:12px">services + tools</text>
  <rect class="inner" x="572" y="279" width="178" height="34" rx="4"/>
  <text class="small" x="661.0" y="300.0" text-anchor="middle" style="font-size:12px">layer authority</text>
  <path class="accentLine" d="M772 226 L790 226"/>
  <rect class="boxHot" x="794" y="108" width="222" height="236" rx="8"/>
  <text class="label" x="905.0" y="150" text-anchor="middle">Validation</text>
  <rect class="inner" x="816" y="187" width="178" height="34" rx="4"/>
  <text class="small" x="905.0" y="208.5" text-anchor="middle" style="font-size:13px">formal gates</text>
  <rect class="innerAccent" x="816" y="233" width="178" height="34" rx="4"/>
  <text class="small" x="905.0" y="254.5" text-anchor="middle" style="font-size:13px">VLM sign-off</text>
  <rect class="inner" x="816" y="279" width="178" height="34" rx="4"/>
  <text class="small" x="905.0" y="300.5" text-anchor="middle" style="font-size:13px">reports</text>
  <path class="line" d="M1016 226 L1034 226"/>
  <rect class="box" x="1038" y="108" width="222" height="236" rx="8"/>
  <text class="label" x="1149.0" y="150" text-anchor="middle">Release</text>
  <rect class="inner" x="1060" y="187" width="178" height="34" rx="4"/>
  <text class="small" x="1149.0" y="208.5" text-anchor="middle" style="font-size:13px">governance</text>
  <rect class="inner" x="1060" y="233" width="178" height="34" rx="4"/>
  <text class="small" x="1149.0" y="254.0" text-anchor="middle" style="font-size:12px">promotion state</text>
  <rect class="inner" x="1060" y="279" width="178" height="34" rx="4"/>
  <text class="small" x="1149.0" y="300.0" text-anchor="middle" style="font-size:12px">SimReady package</text>
  <rect class="boxHot" x="372" y="424" width="616" height="150" rx="8"/>
  <text class="label" x="680.0" y="466" text-anchor="middle">Agent control</text>
  <rect class="innerAccent" x="394" y="488" width="572" height="18" rx="4"/>
  <text class="small" x="680.0" y="501.0" text-anchor="middle" style="font-size:12px">agent loop</text>
  <rect class="innerAccent" x="394" y="514" width="572" height="18" rx="4"/>
  <text class="small" x="680.0" y="527.0" text-anchor="middle" style="font-size:12px">fix library</text>
  <rect class="innerAccent" x="394" y="540" width="572" height="18" rx="4"/>
  <text class="small" x="680.0" y="553.0" text-anchor="middle" style="font-size:12px">library grounding</text>
  <path class="accentLine" d="M557 424 L661 344"/>
  <path class="accentLine" d="M905 344 L905 402 L803 402 L803 424"/>
</svg>
