<svg xmlns="http://www.w3.org/2000/svg" width="1360" height="620" viewBox="0 0 1360 620" role="img" aria-labelledby="title desc">
  <title id="title">Runtime layer contract</title>
  <desc id="desc">Public tools pass typed inputs through schema validation into state-owning services and bounded runtime integrations, supported by prompts, skills and pure utilities.</desc>
  <defs>
    <style>
      .bg { fill: transparent; }
      .box { fill: #222229; stroke: #3b3e49; stroke-width: 2; }
      .boxHot { fill: #292931; stroke: #3c91ff; stroke-width: 2.3; }
      .inner { fill: #2f3039; stroke: #526476; stroke-width: 1.9; }
      .innerHot { fill: #292931; stroke: #3c91ff; stroke-width: 1.9; }
      .innerAccent { fill: #2f3039; stroke: #8c69f0; stroke-width: 1.9; }
      .label { fill: #f0f2f8; font-family: Aptos, Helvetica, sans-serif; font-size: 20px; font-weight: 680; }
      .small { fill: #c8d2dd; font-family: Aptos, Helvetica, sans-serif; font-size: 13px; font-weight: 620; }
      .line { stroke: #4bc3af; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .primaryLine { stroke: #3c91ff; stroke-width: 2.4; fill: none; marker-end: url(#arrowPrimary); }
      .accentLine { stroke: #8c69f0; stroke-width: 2.4; fill: none; marker-end: url(#arrowAccent); }
    </style>
    <marker id="arrow" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 1 L 8 4 L 0 7 z" fill="#4bc3af"/>
    </marker>
    <marker id="arrowPrimary" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 1 L 8 4 L 0 7 z" fill="#3c91ff"/>
    </marker>
    <marker id="arrowAccent" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 1 L 8 4 L 0 7 z" fill="#8c69f0"/>
    </marker>
  </defs>
  <rect class="box" x="120" y="170" width="250" height="230" rx="8"/>
  <text class="label" x="245.0" y="212" text-anchor="middle">CLI + public tools</text>
  <rect class="inner" x="142" y="269" width="206" height="34" rx="4"/>
  <text class="small" x="245.0" y="290.5" text-anchor="middle" style="font-size:13px">typed inputs</text>
  <rect class="inner" x="142" y="315" width="206" height="34" rx="4"/>
  <text class="small" x="245.0" y="336.5" text-anchor="middle" style="font-size:13px">preconditions</text>
  <path class="line" d="M370 285 L401 285"/>
  <rect class="box" x="405" y="170" width="250" height="230" rx="8"/>
  <text class="label" x="530.0" y="212" text-anchor="middle">Schema validation</text>
  <rect class="inner" x="427" y="269" width="206" height="34" rx="4"/>
  <text class="small" x="530.0" y="290.0" text-anchor="middle" style="font-size:12px">Pydantic runtime</text>
  <rect class="inner" x="427" y="315" width="206" height="34" rx="4"/>
  <text class="small" x="530.0" y="336.0" text-anchor="middle" style="font-size:12px">JSON Schema files</text>
  <path class="accentLine" d="M655 285 L686 285"/>
  <rect class="boxHot" x="690" y="170" width="250" height="230" rx="8"/>
  <text class="label" x="815.0" y="212" text-anchor="middle">Services</text>
  <rect class="inner" x="712" y="269" width="206" height="34" rx="4"/>
  <text class="small" x="815.0" y="290.0" text-anchor="middle" style="font-size:12px">state + mutation</text>
  <rect class="innerAccent" x="712" y="315" width="206" height="34" rx="4"/>
  <text class="small" x="815.0" y="336.0" text-anchor="middle" style="font-size:12px">one service / tool</text>
  <path class="accentLine" d="M940 285 L971 285"/>
  <rect class="box" x="975" y="170" width="250" height="230" rx="8"/>
  <text class="label" x="1100.0" y="212" text-anchor="middle">Project + runtimes</text>
  <rect class="inner" x="997" y="269" width="206" height="34" rx="4"/>
  <text class="small" x="1100.0" y="290.0" text-anchor="middle" style="font-size:12px">durable artefacts</text>
  <rect class="inner" x="997" y="315" width="206" height="34" rx="4"/>
  <text class="small" x="1100.0" y="336.0" text-anchor="middle" style="font-size:12px">USD / Isaac / CUDA</text>
  <rect class="box" x="250" y="465" width="340" height="115" rx="8"/>
  <text class="label" x="420.0" y="507" text-anchor="middle" style="font-size:18px">Prompts + skills</text>
  <rect class="inner" x="272" y="529" width="296" height="16" rx="4"/>
  <text class="small" x="420.0" y="540.0" text-anchor="middle" style="font-size:10px">editable guidance</text>
  <rect class="inner" x="272" y="553" width="296" height="16" rx="4"/>
  <text class="small" x="420.0" y="564.0" text-anchor="middle" style="font-size:10px">stage playbooks</text>
  <rect class="box" x="770" y="465" width="340" height="115" rx="8"/>
  <text class="label" x="940.0" y="507" text-anchor="middle" style="font-size:18px">Utilities</text>
  <rect class="inner" x="792" y="529" width="296" height="16" rx="4"/>
  <text class="small" x="940.0" y="540.0" text-anchor="middle" style="font-size:10px">pure helpers</text>
  <rect class="inner" x="792" y="553" width="296" height="16" rx="4"/>
  <text class="small" x="940.0" y="564.0" text-anchor="middle" style="font-size:10px">explicit I/O</text>
  <path class="line" d="M420 465 L420 435 L245 435 L245 400"/>
  <path class="accentLine" d="M940 465 L940 435 L815 435 L815 400"/>
</svg>
