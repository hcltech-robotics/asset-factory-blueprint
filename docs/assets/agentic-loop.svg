<svg xmlns="http://www.w3.org/2000/svg" width="1360" height="620" viewBox="0 0 1360 620" role="img" aria-labelledby="title desc">
  <title id="title">Agentic loop</title>
  <desc id="desc">Stage artefacts pass formal gates and VLM review; revise verdicts route through the fix library or escalate to operators.</desc>
  <defs>
    <style>
      .bg { fill: transparent; }
      .box { fill: #222229; stroke: #3b3e49; stroke-width: 2; }
      .boxHot { fill: #292931; stroke: #3c91ff; stroke-width: 2.3; }
      .inner { fill: #2f3039; stroke: #526476; stroke-width: 1.9; }
      .innerHot { fill: #292931; stroke: #3c91ff; stroke-width: 1.9; }
      .innerAccent { fill: #2f3039; stroke: #8c69f0; stroke-width: 1.9; }
      .label { fill: #f0f2f8; font-family: Aptos, Helvetica, sans-serif; font-size: 20px; font-weight: 680; }
      .small { fill: #c8d2dd; font-family: Aptos, Helvetica, sans-serif; font-size: 13px; font-weight: 620; }
      .line { stroke: #4bc3af; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .primaryLine { stroke: #3c91ff; stroke-width: 2.4; fill: none; marker-end: url(#arrowPrimary); }
      .accentLine { stroke: #8c69f0; stroke-width: 2.4; fill: none; marker-end: url(#arrowAccent); }
    </style>
    <marker id="arrow" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 1 L 8 4 L 0 7 z" fill="#4bc3af"/>
    </marker>
    <marker id="arrowPrimary" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 1 L 8 4 L 0 7 z" fill="#3c91ff"/>
    </marker>
    <marker id="arrowAccent" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 1 L 8 4 L 0 7 z" fill="#8c69f0"/>
    </marker>
  </defs>
  <rect class="box" x="52" y="100" width="236" height="210" rx="8"/>
  <text class="label" x="170.0" y="142" text-anchor="middle">Stage artefacts</text>
  <rect class="inner" x="74" y="166" width="192" height="34" rx="4"/>
  <text class="small" x="170.0" y="187.5" text-anchor="middle" style="font-size:13px">manifests</text>
  <rect class="inner" x="74" y="212" width="192" height="34" rx="4"/>
  <text class="small" x="170.0" y="233.5" text-anchor="middle" style="font-size:13px">renders</text>
  <rect class="inner" x="74" y="258" width="192" height="34" rx="4"/>
  <text class="small" x="170.0" y="279.5" text-anchor="middle" style="font-size:13px">evidence</text>
  <path class="line" d="M288 205 L308 205"/>
  <rect class="box" x="312" y="100" width="236" height="210" rx="8"/>
  <text class="label" x="430.0" y="142" text-anchor="middle">Formal gates</text>
  <rect class="inner" x="334" y="166" width="192" height="34" rx="4"/>
  <text class="small" x="430.0" y="187.5" text-anchor="middle" style="font-size:13px">schemas</text>
  <rect class="inner" x="334" y="212" width="192" height="34" rx="4"/>
  <text class="small" x="430.0" y="233.5" text-anchor="middle" style="font-size:13px">lineage</text>
  <rect class="inner" x="334" y="258" width="192" height="34" rx="4"/>
  <text class="small" x="430.0" y="279.5" text-anchor="middle" style="font-size:13px">domain checks</text>
  <path class="accentLine" d="M548 205 L568 205"/>
  <rect class="boxHot" x="572" y="100" width="236" height="210" rx="8"/>
  <text class="label" x="690.0" y="142" text-anchor="middle">VLM review</text>
  <rect class="innerAccent" x="594" y="166" width="192" height="34" rx="4"/>
  <text class="small" x="690.0" y="187.5" text-anchor="middle" style="font-size:13px">stage rubric</text>
  <rect class="innerAccent" x="594" y="212" width="192" height="34" rx="4"/>
  <text class="small" x="690.0" y="233.5" text-anchor="middle" style="font-size:13px">defect tags</text>
  <rect class="inner" x="594" y="258" width="192" height="34" rx="4"/>
  <text class="small" x="690.0" y="279.5" text-anchor="middle" style="font-size:13px">verdict</text>
  <path class="accentLine" d="M808 205 L828 205"/>
  <rect class="box" x="832" y="100" width="236" height="210" rx="8"/>
  <text class="label" x="950.0" y="142" text-anchor="middle">Sign-off</text>
  <rect class="inner" x="854" y="189" width="192" height="34" rx="4"/>
  <text class="small" x="950.0" y="210.5" text-anchor="middle" style="font-size:13px">approved</text>
  <rect class="inner" x="854" y="235" width="192" height="34" rx="4"/>
  <text class="small" x="950.0" y="256.0" text-anchor="middle" style="font-size:12px">recorded verdict</text>
  <path class="line" d="M1068 205 L1088 205"/>
  <rect class="box" x="1092" y="100" width="236" height="210" rx="8"/>
  <text class="label" x="1210.0" y="142" text-anchor="middle">Progress</text>
  <rect class="inner" x="1114" y="189" width="192" height="34" rx="4"/>
  <text class="small" x="1210.0" y="210.5" text-anchor="middle" style="font-size:13px">progress.json</text>
  <rect class="innerAccent" x="1114" y="235" width="192" height="34" rx="4"/>
  <text class="small" x="1210.0" y="256.5" text-anchor="middle" style="font-size:13px">contact sheet</text>
  <rect class="boxHot" x="260" y="400" width="400" height="150" rx="8"/>
  <text class="label" x="460.0" y="442" text-anchor="middle">Fix library</text>
  <rect class="innerAccent" x="282" y="464" width="356" height="18" rx="4"/>
  <text class="small" x="460.0" y="477.0" text-anchor="middle" style="font-size:12px">symptom to recipe</text>
  <rect class="inner" x="282" y="490" width="356" height="18" rx="4"/>
  <text class="small" x="460.0" y="503.0" text-anchor="middle" style="font-size:12px">bounded attempts</text>
  <rect class="inner" x="282" y="516" width="356" height="18" rx="4"/>
  <text class="small" x="460.0" y="529.0" text-anchor="middle" style="font-size:12px">re-verify</text>
  <rect class="box" x="760" y="400" width="340" height="150" rx="8"/>
  <text class="label" x="930.0" y="442" text-anchor="middle">Escalate</text>
  <rect class="inner" x="782" y="464" width="296" height="31" rx="4"/>
  <text class="small" x="930.0" y="483.5" text-anchor="middle" style="font-size:12px">operator review</text>
  <rect class="inner" x="782" y="503" width="296" height="31" rx="4"/>
  <text class="small" x="930.0" y="522.5" text-anchor="middle" style="font-size:12px">findings attached</text>
  <path class="accentLine" d="M650 310 L650 375 L460 375 L460 400"/>
  <path class="accentLine" d="M260 475 L170 475 L170 310"/>
  <path class="line" d="M730 310 L730 375 L930 375 L930 400"/>
</svg>
